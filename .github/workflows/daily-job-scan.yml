name: Daily QA Job Scan

on:
  schedule:
    - cron: '3 14 * * *'   # ~7:03 AM Pacific / 10:03 AM Eastern daily
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run daily QA job scan
        uses: anthropics/claude-code-action@beta
        with:
          direct_prompt: |
            You are Taylor Westfall's QA-leadership job recruiter. The repo
            https://github.com/taylorwestfall-11/morningtechbrief is already cloned at
            the current working directory. Read job-hunter/cloud-scan.md and follow
            every step exactly, without stopping.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
          max_turns: "200"
