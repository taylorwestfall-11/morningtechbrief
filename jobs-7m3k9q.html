  .bnote{color:var(--muted);font-size:11px;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .empty{text-align:center;color:var(--muted);padding:50px}
  footer{color:var(--muted);font-size:12px;text-align:center;padding:24px}

  {"id":"side-senior-manager-global-qa-operations","title":"Senior Manager, Global QA Operations","company":"Side","category":"games","location":"Remote (Global)","remote":"remote","salary":"","source":"Workable (direct) — manual add","url":"https://apply.workable.com/sideinc/j/D7FC901824/","date_found":"2026-07-06","date_posted":"2026-06-23","notes":"Manually added (not surfaced by daily scan). Games QA/localization services vendor. Global multi-site QA operations: quality visibility & reporting, KPIs, calibration, root-cause; influence without authority; client/partner relationships; AI-led quality improvements. Reports to Global Director of QA. Tailored resume: T_Westfall_Side_Senior_Manager_Global_QA_Operations.","closed":false,"fit":{"score":83,"level":"Strong","why":"Senior QA operations leadership at a global games-services vendor — your multi-site QA ops, KPI/reporting, calibration, and vendor-side insight fit well; a notch below your Director title.","blurb":"I've run global, multi-site QA operations, reporting, and quality standards across Fortis, Netflix, Amazon, and Blizzard, and I'm now leading Fortis' AI transformation of QA — using agentic AI and LLMs to target an 80% cut in manual release-test time. Having directed external QA and localization partners from the client side, I know exactly what Side's clients expect, and I'd bring strong calibration, root-cause, and cross-site consistency to your global QA operations."}}
]/*__JOBS_END__*/;
const LAST_SCAN = "2026-07-06";

const STAGES = [
  {key:"new",       label:"⚪ New / Not applied", group:"open"},
  {key:"applied",   label:"📨 Applied",            group:"pipeline"},
  {key:"recruiter", label:"📞 Recruiter screen",   group:"pipeline"},
  {key:"interview", label:"🎤 Interviewing",       group:"pipeline"},
  {key:"final",     label:"🏁 Final round",         group:"pipeline"},
  {key:"offer",     label:"🎉 Offer",               group:"pipeline"},
  {key:"rejected",  label:"❌ Rejected / Denied",   group:"closed"},
  {key:"ghosted",   label:"👻 No response",         group:"closed"},
  {key:"dropped",   label:"🚫 Stopped tracking",    group:"closed"}
];
const STAGE = Object.fromEntries(STAGES.map(s=>[s.key,s]));
const STALE_DAYS = 30;
const EXPIRE_DAYS = 90;  // date_posted older than ~3 months ⇒ likely expired/filled

const KEY="jobhunter_status_v2";
let state = JSON.parse(localStorage.getItem(KEY) || "{}");
try{ const v1=JSON.parse(localStorage.getItem("jobhunter_status_v1")||"{}");
  for(const id in v1){ if(!state[id]) state[id]={status:v1[id].status,date:v1[id].date,notes:""}; } }catch(e){}
const save = ()=>localStorage.setItem(KEY, JSON.stringify(state));
const today = ()=> new Date().toISOString().slice(0,10);
const daysBetween = (d)=> d ? Math.floor((Date.now()-new Date(d))/86400000) : null;

function rec(id){ return state[id] || {status:"new",date:"",notes:""}; }
function statusOf(id){ return rec(id).status; }
function groupOf(id){ return STAGE[statusOf(id)]?.group || "open"; }
function fitColor(s){ return s>=90?"#7ee0a8":s>=80?"#9ed16b":s>=65?"#e9c46a":s>=50?"#f0a868":"#e07a5f"; }

let filters={cat:"all",remote:"all",q:"",view:"open",sort:"fit",layout:"list"};

// Board columns: New, the 5 active pipeline stages, and a combined Closed column.
const BOARD_COLS=[
  {key:"new",      label:"⚪ New",        set:"new"},
  {key:"applied",  label:"📨 Applied",    set:"applied"},
  {key:"recruiter",label:"📞 Recruiter",  set:"recruiter"},
  {key:"interview",label:"🎤 Interview",  set:"interview"},
  {key:"final",    label:"🏁 Final",      set:"final"},
  {key:"offer",    label:"🎉 Offer",      set:"offer"},
  {key:"closed",   label:"⚫ Closed",     set:"rejected", members:["rejected","ghosted","dropped"]}
];

function render(){
  document.getElementById("lastScan").textContent = "Last scan: "+LAST_SCAN+" · "+JOBS.length+" roles tracked";
  const counts={}; STAGES.forEach(s=>counts[s.key]=0);
  let openN=0,pipeN=0,closedN=0,freshN=0;
  JOBS.forEach(j=>{ const g=groupOf(j.id); counts[statusOf(j.id)]++;
    if(g==="open")openN++; else if(g==="pipeline")pipeN++; else closedN++;
    if(j.date_found===LAST_SCAN && statusOf(j.id)==="new")freshN++; });
  const views=[
    {k:"open",label:"🟢 To review",n:openN,extra:freshN?` (✨${freshN} new)`:""},
    {k:"pipeline",label:"🔵 In progress",n:pipeN,extra:""},
    {k:"closed",label:"⚫ Closed",n:closedN,extra:""},
    {k:"all",label:"All",n:JOBS.length,extra:""}
  ];
  document.getElementById("pipe").innerHTML =
    (filters.layout==="board" ? `<div class="chip" style="cursor:default">📊 Drag cards between columns to update status</div>`
      : views.map(v=>`<div class="chip ${filters.view===v.k?"on":""}" onclick="setView('${v.k}')">${v.label} <b>${v.n}</b>${v.extra}</div>`).join("")) +
    `<div class="chip" style="cursor:default" title="Applications in the active pipeline">📨${counts.applied} 📞${counts.recruiter} 🎤${counts.interview} 🏁${counts.final} 🎉${counts.offer}</div>`;

  const q=filters.q.toLowerCase();
  const sortFn=(a,b)=> filters.sort==="new"
      ? (b.date_found||"").localeCompare(a.date_found||"") || (b.fit?.score||0)-(a.fit?.score||0)
      : (b.fit?.score||0)-(a.fit?.score||0);
  const matches=j=>{
    if(filters.cat!=="all" && j.category!==filters.cat) return false;
    if(filters.remote==="remote" && j.remote!=="remote") return false;
    if(q && !(`${j.title} ${j.company} ${j.location} ${j.notes} ${j.source} ${rec(j.id).notes}`.toLowerCase().includes(q))) return false;
    return true;
  };
  const list=document.getElementById("list");
  if(filters.layout==="board"){ renderBoard(JOBS.filter(matches).sort(sortFn)); return; }
  let rows=JOBS.filter(j=> matches(j) && (filters.view==="all"||groupOf(j.id)===filters.view)).sort(sortFn);
  if(!rows.length){ list.innerHTML=`<div class="empty">No roles match these filters.</div>`; return; }
  list.innerHTML = rows.map(j=>{
    const r=rec(j.id), st=r.status, g=STAGE[st].group;
    const isNew = j.date_found===LAST_SCAN && st==="new";
    const foundAge = daysBetween(j.date_found);
    const isStale = st==="new" && foundAge!==null && foundAge>STALE_DAYS;
    const postedAge = daysBetween(j.date_posted);
    const likelyExpired = st==="new" && postedAge!==null && postedAge>EXPIRE_DAYS;
    const remoteBadge = j.remote==="remote"?`<span class="badge remote">🌍 Remote</span>`
      : j.remote==="hybrid"?`<span class="badge hybrid">Hybrid</span>`:`<span class="badge">On-site</span>`;
    let aging="";
    if(g==="pipeline" && r.date){ const d=daysBetween(r.date);
      aging=`<span class="aging ${d>=10?"warn":""}">${STAGE[st].label.replace(/^\S+\s/,"")} · ${d}d ago${d>=10?" — follow up?":""}</span>`; }
    const opts=STAGES.map(s=>`<option value="${s.key}" ${s.key===st?"selected":""}>${s.label}</option>`).join("");
    const f=j.fit;
    const fitBlock = f?`<div class="fit"><div class="ring" style="background:${fitColor(f.score)}">${f.score}</div><div class="lvl">${f.level}</div></div>`:`<div class="score">⭐ —</div>`;
    return `<div class="card ${g==="closed"?"closed":""} ${likelyExpired?"expired":""} ${st==="offer"?"offer":""} ${isStale?"stale":""}">
      <div class="card-top">
        <div>
          <p class="title">${j.title}</p>
          <div class="company">${j.company} · ${j.location}</div>
          ${j.salary?`<div class="salary">💰 ${j.salary}</div>`:""}
        </div>
        ${fitBlock}
      </div>
      <div class="badges">
        ${isNew?`<span class="badge new">✨ NEW</span>`:""}
        ${st!=="new"?`<span class="badge stage">${STAGE[st].label}</span>`:""}
        ${isStale?`<span class="badge stale">⏳ ${foundAge}d old</span>`:""}
        <span class="badge ${j.category}">${j.category==="games"?"🎮 Games":"💻 Tech"}</span>
        ${remoteBadge}
        <span class="badge">via ${j.source}</span>
        ${j.date_posted?`<span class="badge">📅 posted ${j.date_posted}</span>`:""}
        ${likelyExpired?`<span class="badge stale">⚠️ likely expired · ${Math.round(postedAge/30)}mo</span>`:""}
      </div>
      ${f?`<div class="fit-why"><b>Fit:</b> ${f.why}</div>`:""}
      ${j.notes?`<div class="notes-line">${j.notes}</div>`:""}
      <div class="card-actions">
        <a class="apply" href="${j.url}" target="_blank" rel="noopener">View / Apply ↗</a>
        ${f?.blurb?`<button class="btn" onclick="copyBlurb('${j.id}',this)">📋 Copy cover-letter blurb</button>`:""}
        <select class="stage-sel" onchange="setStage('${j.id}',this.value)">${opts}</select>
        ${aging}
      </div>
      <textarea class="mynotes" placeholder="My notes: recruiter name, next step, interview date, comp…" onchange="setNotes('${j.id}',this.value)">${(r.notes||"").replace(/</g,"&lt;")}</textarea>
    </div>`;
  }).join("");
}

function renderBoard(rows){
  const list=document.getElementById("list");
  const byCol={}; BOARD_COLS.forEach(c=>byCol[c.key]=[]);
  rows.forEach(j=>{ const st=statusOf(j.id);
    const col=BOARD_COLS.find(c=> c.members? c.members.includes(st) : c.set===st) || BOARD_COLS[0];
    byCol[col.key].push(j); });
  list.innerHTML=`<div class="board">`+BOARD_COLS.map(c=>{
    const items=byCol[c.key];
    const cards=items.map(boardCard).join("") || `<div class="col-hint">drop here</div>`;
    return `<div class="col" data-col="${c.key}" ondragover="colOver(event)" ondragleave="colLeave(event)" ondrop="colDrop(event,'${c.key}')">
      <div class="col-head"><span>${c.label}</span><span class="n">${items.length}</span></div>${cards}</div>`;
  }).join("")+`</div>`;
}
function boardCard(j){
  const r=rec(j.id), st=r.status, foundAge=daysBetween(j.date_found);
  const isStale=st==="new"&&foundAge!==null&&foundAge>STALE_DAYS;
  const postedAge=daysBetween(j.date_posted);
  const likelyExpired=st==="new"&&postedAge!==null&&postedAge>EXPIRE_DAYS;
  const f=j.fit;
  const ring=f?`<div class="bring" style="background:${fitColor(f.score)}">${f.score}</div>`:"";
  const remoteB=j.remote==="remote"?`<span class="badge remote">🌍</span>`:j.remote==="hybrid"?`<span class="badge hybrid">Hybrid</span>`:`<span class="badge">On-site</span>`;
  const note=r.notes?`<div class="bnote">📝 ${r.notes.replace(/</g,"&lt;")}</div>`:"";
  return `<div class="bcard ${likelyExpired?"expired":""} ${st==="offer"?"offer":""} ${isStale?"stale":""}" draggable="true" data-id="${j.id}" ondragstart="cardDrag(event,'${j.id}')" ondragend="cardDragEnd(event)">
    <div class="bt"><div><h4>${j.title}</h4><div class="bco">${j.company}</div></div>${ring}</div>
    <div class="bmeta"><span class="badge ${j.category}">${j.category==="games"?"🎮":"💻"}</span>${remoteB}${j.date_posted?`<span class="badge">📅 ${j.date_posted}</span>`:""}${likelyExpired?`<span class="badge stale">⚠️ ${Math.round(postedAge/30)}mo</span>`:""}${isStale?`<span class="badge stale">⏳${foundAge}d</span>`:""}<a class="bapply" href="${j.url}" target="_blank" rel="noopener">Apply ↗</a></div>
    ${note}</div>`;
}
let dragId=null;
function cardDrag(e,id){ dragId=id; e.dataTransfer.effectAllowed="move"; e.target.classList.add("dragging"); }
function cardDragEnd(e){ e.target.classList.remove("dragging"); document.querySelectorAll(".col.drop").forEach(c=>c.classList.remove("drop")); }
function colOver(e){ e.preventDefault(); e.currentTarget.classList.add("drop"); e.dataTransfer.dropEffect="move"; }
function colLeave(e){ e.currentTarget.classList.remove("drop"); }
function colDrop(e,colKey){ e.preventDefault(); e.currentTarget.classList.remove("drop");
  const col=BOARD_COLS.find(c=>c.key===colKey); if(!col||!dragId) return;
  const cur=statusOf(dragId);
  let target = (col.members && col.members.includes(cur)) ? cur : col.set;
  setStage(dragId,target); dragId=null;
}
function copyBlurb(id,btn){
  const j=JOBS.find(x=>x.id===id); if(!j||!j.fit) return;
  navigator.clipboard.writeText(j.fit.blurb).then(()=>{ const t=btn.textContent; btn.textContent="✅ Copied!"; setTimeout(()=>btn.textContent=t,1500); });
}
function setStage(id,status){
  const r=rec(id);
  if(status==="new" && !r.notes){ delete state[id]; }
  else { state[id]={status,date:(status==="new"?"":today()),notes:r.notes||""}; }
  save(); render();
}
function setNotes(id,val){ const r=rec(id); state[id]={status:r.status,date:r.date||"",notes:val}; save(); }
function setView(v){ filters.view=v; render(); }

document.getElementById("search").addEventListener("input",e=>{filters.q=e.target.value;render();});
function wireSeg(segId,key){
  document.querySelectorAll(`#${segId} button`).forEach(b=>b.addEventListener("click",()=>{
    document.querySelectorAll(`#${segId} button`).forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); filters[key]=b.dataset[key]; render();
  }));
}
wireSeg("catSeg","cat"); wireSeg("remoteSeg","remote"); wireSeg("sortSeg","sort"); wireSeg("layoutSeg","layout");

document.getElementById("exportBtn").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="jobhunter-status-backup.json"; a.click();
});
document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader(); rd.onload=()=>{ try{ state={...state,...JSON.parse(rd.result)}; save(); render(); }catch(err){ alert("Invalid file"); } }; rd.readAsText(f);
});

render();
</script>
</body>
</html>
